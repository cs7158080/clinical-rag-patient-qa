patients_root: "C:/SpeechTherapy/clients"
data_dir: "./data"
logs_dir: "./logs"
models_dir: "./models"

# run_mode: "production" | "test"
# production — ingestion is BLOCKED if the NER model cannot be loaded (fail-closed).
# test       — ingestion proceeds without NER, with a prominent warning.
run_mode: "test"

pinecone:
  index_name: "rag-index"
  dimension: 1024

cohere:
  model: "embed-multilingual-v3.0"

anthropic:
  extraction_model: "claude-haiku-4-5-20251001"
  generation_model: "claude-haiku-4-5-20251001"
  temperature_extraction: 0
  temperature_generation: 0.2
  max_tokens_generation: 10000

logging:
  level: "INFO"
  retention_days: 7

evaluation:
  enabled: false
